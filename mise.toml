# =============================================================================
# mise.toml — terminal-games / arcade
# =============================================================================

[tools]
rust = "stable"

[env]
CARGO_TERM_COLOR = "always"
BINARY_NAME = "arcade"

# -----------------------------------------------------------------------------
# Tasks
# -----------------------------------------------------------------------------

[tasks.run]
description = "Launch arcade in dev mode"
alias = "r"
run = "cargo run"

[tasks.build]
description = "Build optimised release binary for your CPU"
alias = "b"
run = 'RUSTFLAGS="-C target-cpu=native" cargo build --release'

[tasks.start]
description = "Run the last built release binary directly"
alias = "s"
run = "./target/release/arcade"

[tasks.check]
description = "Type-check without producing a binary"
alias = "c"
run = "cargo check"

[tasks.test]
description = "Run all unit tests"
alias = "t"
run = "cargo nextest run"

[tasks.lint]
description = "Run Clippy with strict lint flags"
alias = "l"
run = "cargo clippy -- -D clippy::all -D clippy::pedantic -D clippy::nursery"

[tasks.fmt]
description = "Format all source files"
alias = "f"
run = "cargo fmt"

[tasks."fmt:check"]
description = "Check formatting without writing changes"
alias = "fc"
run = "cargo fmt -- --check"

[tasks.watch]
description = "Re-run arcade on every file change"
alias = "w"
run = "cargo watch -x run"

[tasks.ci]
description = "Full CI pipeline: fmt → check → lint → test → build"
run = """
cargo fmt -- --check
cargo check --all-targets
cargo clippy -- -D clippy::all -D clippy::pedantic -D clippy::nursery
cargo nextest run
RUSTFLAGS="-C target-cpu=native" cargo build --release
echo "CI passed"
"""

[tasks.clean]
description = "Remove all build artefacts"
alias = "cl"
run = "cargo clean"
