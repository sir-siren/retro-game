# =============================================================================
# .cargo/config.toml — terminal-games / arcade
# =============================================================================
# Project-level Cargo configuration. Overrides ~/.cargo/config.toml for this
# project only.
#
# Profiles summary:
#   cargo run                          → dev      (fast compile, debug)
#   cargo run    --profile preview     → preview  (optimised, debug symbols)
#   cargo build  --release             → release  (fast ship build)
#   cargo build  --profile smol        → smol     (ultra-size, strip everything)
#   cargo build  --profile smol-lto    → smol-lto (smol + full fat LTO, slowest)
# =============================================================================

# -----------------------------------------------------------------------------
# Linker — use mold on Linux/WSL for faster incremental linking.
# On Windows the MSVC linker is used automatically; no change needed there.
# -----------------------------------------------------------------------------

[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "link-arg=-fuse-ld=mold"]


[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"

[target.armv7-unknown-linux-gnueabihf]
linker = "arm-linux-gnueabihf-gcc"

# Static musl builds — used in CI for portable Linux binaries
[target.x86_64-unknown-linux-musl]
rustflags = ["-C", "target-feature=+crt-static"]

[target.aarch64-unknown-linux-musl]
linker = "aarch64-linux-musl-gcc"
rustflags = ["-C", "target-feature=+crt-static"]

# -----------------------------------------------------------------------------
# Environment
# -----------------------------------------------------------------------------

[env]
CARGO_TERM_COLOR = "always"

# =============================================================================
# Profiles
# =============================================================================
# All profiles live here so they travel with the repo and every contributor
# gets the same build behaviour automatically.
# =============================================================================

# -----------------------------------------------------------------------------
# dev  (cargo build / cargo run)
# Default: fast compile, full debug info, overflow checks on.
# Deps are compiled at opt-level 1 so the game actually runs at a playable
# speed even in dev mode without sacrificing your compile time.
# -----------------------------------------------------------------------------

[profile.dev]
opt-level = 0          # no optimisation on your own code → fast recompile
debug = true           # full debug symbols for lldb / rust-lldb
incremental = true     # only recompile changed files
overflow-checks = true # catch integer overflows during development

[profile.dev.package."*"]
opt-level = 1 # deps get basic optimisation — crossterm renders smoothly

# -----------------------------------------------------------------------------
# preview  (cargo build/run --profile preview)
# Release-equivalent speed, but keeps debug symbols so you can profile the
# running game with perf / cargo-flamegraph without a fully stripped binary.
# Compiles faster than release because LTO and single codegen unit are off.
# -----------------------------------------------------------------------------

[profile.preview]
inherits = "release"
debug = true         # keep symbols for profiler / flamegraph
strip = "none"       # don't strip — we want the symbols
lto = false          # skip LTO for faster build
codegen-units = 8    # more parallelism → faster compile
opt-level = 3

# -----------------------------------------------------------------------------
# release  (cargo build --release)
# The standard ship build. Thin LTO balances compile time vs binary quality.
# Already declared in Cargo.toml — these values are kept in sync here for
# reference but the Cargo.toml declaration takes precedence.
# -----------------------------------------------------------------------------

[profile.release]
opt-level = 3
lto = "thin"            # thin LTO: good optimisation, reasonable compile time
codegen-units = 1       # single unit: best inter-procedural optimisation
strip = "symbols"       # strip debug symbols → smaller binary
debug = false
overflow-checks = false # no runtime overhead in production
panic = "abort"         # abort on panic: smaller binary, no unwinding tables

# -----------------------------------------------------------------------------
# smol  (cargo build --profile smol)
# ═══════════════════════════════════════════════════════════════════════════
# ULTRA SIZE OPTIMISATION — every knob turned to produce the smallest
# possible binary. Uses thin LTO for a reasonable compile time.
# Use this for distributing pre-built binaries on the Releases page.
# ═══════════════════════════════════════════════════════════════════════════
# opt-level "z"  → most aggressive dead-code elimination, prefers smaller
#                  codegen paths over faster ones
# lto "thin"     → cross-crate dead code removal without full LTO compile time
# codegen-units 1→ whole-program view for the compiler
# strip "symbols"→ removes all debug symbols and section headers
# panic "abort"  → removes the entire unwind machinery (~50–100KB saved)
# overflow-checks false → no hidden branches for overflow detection
# -----------------------------------------------------------------------------

[profile.smol]
inherits = "release"
opt-level = "z"         # size over speed
lto = "thin"            # cross-crate DCE, reasonable compile time
codegen-units = 1       # maximum optimisation surface
strip = "symbols"       # strip everything
debug = false
overflow-checks = false
panic = "abort"         # no unwind tables → significant size saving

# -----------------------------------------------------------------------------
# smol-lto  (cargo build --profile smol-lto)
# Same as smol but with FULL fat LTO.
# ⚠ Very slow to compile — only run this for final release artifacts.
# Typically saves an additional 5–15% on top of smol.
# -----------------------------------------------------------------------------

[profile.smol-lto]
inherits = "smol"
lto = true        # fat LTO: maximum dead code elimination, slowest build
