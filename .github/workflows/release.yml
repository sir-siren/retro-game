name: Build & Release

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: write

defaults:
    run:
        shell: bash

env:
    CARGO_TERM_COLOR: always
    BINARY_NAME: arcade

jobs:
    build:
        name: Build ${{ matrix.artifact }}
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - target: aarch64-apple-darwin
                      os: macos-latest
                      artifact: arcade-macos-aarch64
                      use_cross: false
                      can_test: true

                    - target: x86_64-apple-darwin
                      os: macos-latest
                      artifact: arcade-macos-x86_64
                      use_cross: false
                      can_test: false

                    - target: x86_64-pc-windows-msvc
                      os: windows-latest
                      artifact: arcade-windows-x86_64.exe
                      use_cross: false
                      can_test: true

                    - target: i686-pc-windows-msvc
                      os: windows-latest
                      artifact: arcade-windows-x86.exe
                      use_cross: false
                      can_test: true

                    - target: aarch64-pc-windows-msvc
                      os: windows-latest
                      artifact: arcade-windows-aarch64.exe
                      use_cross: false
                      can_test: false

                    - target: x86_64-pc-windows-gnu
                      os: windows-latest
                      artifact: arcade-windows-x86_64-gnu.exe
                      use_cross: false
                      can_test: true

                    - target: x86_64-unknown-linux-gnu
                      os: ubuntu-latest
                      artifact: arcade-linux-x86_64
                      use_cross: false
                      can_test: true

                    - target: i686-unknown-linux-gnu
                      os: ubuntu-latest
                      artifact: arcade-linux-x86
                      use_cross: true
                      can_test: false

                    - target: aarch64-unknown-linux-gnu
                      os: ubuntu-latest
                      artifact: arcade-linux-aarch64
                      use_cross: true
                      can_test: false

                    - target: armv7-unknown-linux-gnueabihf
                      os: ubuntu-latest
                      artifact: arcade-linux-armv7
                      use_cross: true
                      can_test: false

                    - target: arm-unknown-linux-gnueabihf
                      os: ubuntu-latest
                      artifact: arcade-linux-armv6
                      use_cross: true
                      can_test: false

                    - target: riscv64gc-unknown-linux-gnu
                      os: ubuntu-latest
                      artifact: arcade-linux-riscv64
                      use_cross: true
                      can_test: false

                    - target: loongarch64-unknown-linux-gnu
                      os: ubuntu-latest
                      artifact: arcade-linux-loongarch64
                      use_cross: true
                      can_test: false

                    - target: powerpc64le-unknown-linux-gnu
                      os: ubuntu-latest
                      artifact: arcade-linux-ppc64le
                      use_cross: true
                      can_test: false

                    - target: powerpc64-unknown-linux-gnu
                      os: ubuntu-latest
                      artifact: arcade-linux-ppc64
                      use_cross: true
                      can_test: false

                    - target: s390x-unknown-linux-gnu
                      os: ubuntu-latest
                      artifact: arcade-linux-s390x
                      use_cross: true
                      can_test: false

                    - target: x86_64-unknown-linux-musl
                      os: ubuntu-latest
                      artifact: arcade-linux-x86_64-musl
                      use_cross: true
                      can_test: false

                    - target: i686-unknown-linux-musl
                      os: ubuntu-latest
                      artifact: arcade-linux-x86-musl
                      use_cross: true
                      can_test: false

                    - target: aarch64-unknown-linux-musl
                      os: ubuntu-latest
                      artifact: arcade-linux-aarch64-musl
                      use_cross: true
                      can_test: false

                    - target: armv7-unknown-linux-musleabihf
                      os: ubuntu-latest
                      artifact: arcade-linux-armv7-musl
                      use_cross: true
                      can_test: false

                    - target: arm-unknown-linux-musleabihf
                      os: ubuntu-latest
                      artifact: arcade-linux-armv6-musl
                      use_cross: true
                      can_test: false

                    - target: loongarch64-unknown-linux-musl
                      os: ubuntu-latest
                      artifact: arcade-linux-loongarch64-musl
                      use_cross: true
                      can_test: false

                    - target: x86_64-unknown-freebsd
                      os: ubuntu-latest
                      artifact: arcade-freebsd-x86_64
                      use_cross: true
                      can_test: false

                    - target: i686-unknown-freebsd
                      os: ubuntu-latest
                      artifact: arcade-freebsd-x86
                      use_cross: true
                      can_test: false

                    - target: aarch64-linux-android
                      os: ubuntu-latest
                      artifact: arcade-android-aarch64
                      use_cross: true
                      can_test: false

                    - target: armv7-linux-androideabi
                      os: ubuntu-latest
                      artifact: arcade-android-arm
                      use_cross: true
                      can_test: false

                    - target: x86_64-linux-android
                      os: ubuntu-latest
                      artifact: arcade-android-x86_64
                      use_cross: true
                      can_test: false

                    - target: i686-linux-android
                      os: ubuntu-latest
                      artifact: arcade-android-x86
                      use_cross: true
                      can_test: false

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install Rust Toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Restore Cache
              uses: Swatinem/rust-cache@v2
              with:
                  key: ${{ matrix.target }}

            - name: Install cross
              if: matrix.use_cross
              uses: taiki-e/install-action@v2
              with:
                  tool: cross

            - name: Build
              run: |
                  cmd="cargo"
                  [ "${{ matrix.use_cross }}" = "true" ] && cmd="cross"
                  $cmd build --release --target ${{ matrix.target }}

            - name: Test
              if: matrix.can_test
              run: cargo test --release --target ${{ matrix.target }}

            - name: Stage Artifact
              run: |
                  src="target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}"
                  [ "${{ runner.os }}" = "Windows" ] && src="${src}.exe"
                  cp "$src" "${{ matrix.artifact }}"

            - name: Upload Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.artifact }}
                  path: ${{ matrix.artifact }}

    build-netbsd:
        name: Build arcade-netbsd-x86_64
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Build on NetBSD
              uses: vmactions/netbsd-vm@v1
              with:
                  release: "10.1"
                  prepare: pkgin -y install curl
                  run: |
                      curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
                      . "$HOME/.cargo/env"
                      cargo build --release
                      cp target/release/${{ env.BINARY_NAME }} arcade-netbsd-x86_64

            - name: Upload Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: arcade-netbsd-x86_64
                  path: arcade-netbsd-x86_64

    build-openbsd:
        name: Build arcade-openbsd-x86_64
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Build on OpenBSD
              uses: vmactions/openbsd-vm@v1
              with:
                  usesh: true
                  prepare: pkg_add rust
                  run: |
                      cargo build --release
                      cp target/release/${{ env.BINARY_NAME }} arcade-openbsd-x86_64

            - name: Upload Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: arcade-openbsd-x86_64
                  path: arcade-openbsd-x86_64

    release:
        name: Release
        needs: [build, build-netbsd, build-openbsd]
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Generate Version Tag
              id: version
              run: |
                  COUNT=$(git rev-list --count HEAD)
                  echo "tag=v0.${COUNT}.0" >> "$GITHUB_OUTPUT"

            - name: Download Artifacts
              uses: actions/download-artifact@v4
              with:
                  path: artifacts

            - name: Generate Checksums
              run: |
                  cd artifacts
                  find . -type f | sort | xargs sha256sum | sed 's|\./||g' > ../SHASUMS256.txt

            - name: Publish Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.version.outputs.tag }}
                  name: Release ${{ steps.version.outputs.tag }}
                  generate_release_notes: true
                  files: |
                      artifacts/**/*
                      SHASUMS256.txt
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
