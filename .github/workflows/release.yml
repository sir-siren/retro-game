name: Build & Release

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: write

env:
    CARGO_TERM_COLOR: always
    BINARY_NAME: arcade

jobs:
    build:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - target: x86_64-unknown-linux-gnu
                      os: ubuntu-latest
                      artifact: arcade-linux-x86_64
                    - target: x86_64-unknown-linux-musl
                      os: ubuntu-latest
                      artifact: arcade-linux-x86_64-musl
                    - target: aarch64-unknown-linux-gnu
                      os: ubuntu-latest
                      artifact: arcade-linux-aarch64
                    - target: x86_64-pc-windows-msvc
                      os: windows-latest
                      artifact: arcade-windows-x86_64.exe
                    - target: x86_64-apple-darwin
                      os: macos-latest
                      artifact: arcade-macos-x86_64
                    - target: aarch64-apple-darwin
                      os: macos-latest
                      artifact: arcade-macos-aarch64

        runs-on: ${{ matrix.os }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Install cross-compilation tools (Linux ARM)
              if: matrix.target == 'aarch64-unknown-linux-gnu'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y gcc-aarch64-linux-gnu

            - name: Install musl tools
              if: matrix.target == 'x86_64-unknown-linux-musl'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y musl-tools

            - name: Configure linker (aarch64-linux)
              if: matrix.target == 'aarch64-unknown-linux-gnu'
              run: |
                  mkdir -p .cargo
                  echo '[target.aarch64-unknown-linux-gnu]' >> .cargo/config.toml
                  echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml

            - name: Build release binary
              run: cargo build --release --target ${{ matrix.target }}

            - name: Run tests
              if: "!contains(matrix.target, 'aarch64')"
              run: cargo test --target ${{ matrix.target }}

            - name: Rename binary (Unix)
              if: runner.os != 'Windows'
              run: cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} ${{ matrix.artifact }}

            - name: Rename binary (Windows)
              if: runner.os == 'Windows'
              run: cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe ${{ matrix.artifact }}

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.artifact }}
                  path: ${{ matrix.artifact }}

    release:
        needs: build
        # only release on pushes to main, not PRs
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # needed to count all commits for versioning

            - name: Generate version tag
              id: version
              run: |
                  # auto version based on commit count: v0.1.0, v0.2.0, etc.
                  COUNT=$(git rev-list --count HEAD)
                  echo "tag=v0.${COUNT}.0" >> $GITHUB_OUTPUT
                  echo "Generated tag: v0.${COUNT}.0"

            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: artifacts

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.version.outputs.tag }}
                  name: Release ${{ steps.version.outputs.tag }}
                  generate_release_notes: true
                  files: artifacts/**/*
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
