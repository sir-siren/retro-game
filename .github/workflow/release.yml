name: Build and Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

env:
    BINARY_NAME: arcade
    CARGO_TERM_COLOR: always
    RUST_BACKTRACE: 1

jobs:
    build:
        name: Build — ${{ matrix.target }}
        runs-on: ${{ matrix.runner }}

        strategy:
            fail-fast: false
            matrix:
                include:
                    # ── Windows ────────────────────────────────────────────────────────
                    - target: x86_64-pc-windows-msvc
                      runner: windows-latest
                      cross: false
                      ext: .exe

                    - target: i686-pc-windows-msvc
                      runner: windows-latest
                      cross: false
                      ext: .exe

                    - target: aarch64-pc-windows-msvc
                      runner: windows-latest
                      cross: false
                      ext: .exe

                    # ── macOS ──────────────────────────────────────────────────────────
                    - target: x86_64-apple-darwin
                      runner: macos-13 # last Intel runner
                      cross: false
                      ext: ""

                    - target: aarch64-apple-darwin
                      runner: macos-latest # Apple Silicon (M-series)
                      cross: false
                      ext: ""

                    # ── Linux native ───────────────────────────────────────────────────
                    - target: x86_64-unknown-linux-gnu
                      runner: ubuntu-latest
                      cross: false
                      ext: ""

                    - target: x86_64-unknown-linux-musl
                      runner: ubuntu-latest
                      cross: false
                      ext: ""

                    # ── Linux cross (via `cross`) ──────────────────────────────────────
                    - target: i686-unknown-linux-gnu
                      runner: ubuntu-latest
                      cross: true
                      ext: ""

                    - target: i686-unknown-linux-musl
                      runner: ubuntu-latest
                      cross: true
                      ext: ""

                    - target: aarch64-unknown-linux-gnu
                      runner: ubuntu-latest
                      cross: true
                      ext: ""

                    - target: aarch64-unknown-linux-musl
                      runner: ubuntu-latest
                      cross: true
                      ext: ""

                    - target: armv7-unknown-linux-gnueabihf
                      runner: ubuntu-latest
                      cross: true
                      ext: ""

                    - target: armv7-unknown-linux-musleabihf
                      runner: ubuntu-latest
                      cross: true
                      ext: ""

                    - target: arm-unknown-linux-gnueabihf
                      runner: ubuntu-latest
                      cross: true
                      ext: ""

                    - target: arm-unknown-linux-musleabihf
                      runner: ubuntu-latest
                      cross: true
                      ext: ""

                    - target: riscv64gc-unknown-linux-gnu
                      runner: ubuntu-latest
                      cross: true
                      ext: ""

                    - target: powerpc64le-unknown-linux-gnu
                      runner: ubuntu-latest
                      cross: true
                      ext: ""

                    - target: s390x-unknown-linux-gnu
                      runner: ubuntu-latest
                      cross: true
                      ext: ""

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  toolchain: "1.84"
                  targets: ${{ matrix.target }}

            - name: Cache Cargo registry and build
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry/index/
                      ~/.cargo/registry/cache/
                      ~/.cargo/git/db/
                      target/
                  key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-${{ matrix.target }}-cargo-

            # musl libc for native x86_64-musl build (no cross needed)
            - name: Install musl tools (x86_64-musl native)
              if: matrix.target == 'x86_64-unknown-linux-musl'
              run: sudo apt-get update && sudo apt-get install -y musl-tools

            - name: Install cross
              if: matrix.cross == true
              uses: taiki-e/install-action@v2
              with:
                  tool: cross

            - name: Build (cargo)
              if: matrix.cross == false
              run: cargo build --release --target ${{ matrix.target }}

            - name: Build (cross)
              if: matrix.cross == true
              run: cross build --release --target ${{ matrix.target }}

            # ── Rename binary to include target triple ─────────────────────────────
            - name: Rename binary (Unix)
              if: runner.os != 'Windows'
              run: |
                  src="target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}"
                  dst="${{ env.BINARY_NAME }}-${{ matrix.target }}${{ matrix.ext }}"
                  cp "$src" "$dst"

            - name: Rename binary (Windows)
              if: runner.os == 'Windows'
              shell: pwsh
              run: |
                  $src = "target\${{ matrix.target }}\release\${{ env.BINARY_NAME }}${{ matrix.ext }}"
                  $dst = "${{ env.BINARY_NAME }}-${{ matrix.target }}${{ matrix.ext }}"
                  Copy-Item $src $dst

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ env.BINARY_NAME }}-${{ matrix.target }}
                  path: ${{ env.BINARY_NAME }}-${{ matrix.target }}${{ matrix.ext }}
                  if-no-files-found: error
                  retention-days: 1

    release:
        name: Publish Release
        needs: build
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: artifacts/
                  merge-multiple: true

            - name: List artifacts
              run: ls -lh artifacts/

            - name: Generate checksums (SHA-256)
              working-directory: artifacts
              run: sha256sum * > SHA256SUMS.txt

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  name: "Arcade ${{ github.ref_name }}"
                  tag_name: ${{ github.ref_name }}
                  draft: false
                  prerelease: ${{ contains(github.ref_name, '-') }}
                  generate_release_notes: true
                  files: |
                      artifacts/*
